name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 🔑 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📚 Install dependencies
        run: |
          cd client
          pnpm install --frozen-lockfile

      - name: 🔍 Verify EAS configuration
        run: |
          cd client
          echo "📋 EAS Configuration:"
          cat eas.json || echo "⚠️  eas.json not found"

          echo ""
          echo "📋 Expo Configuration:"
          cat app.config.ts || echo "⚠️  app.config.ts not found"

      - name: 🔨 Build Android APK (Preview)
        run: |
          cd client
          echo "🚀 Starting Android build..."
          npx eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_BACKEND_BASE_URL: ${{ secrets.BACKEND_URL || 'https://your-coze-app.vercel.app' }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-preview
          path: |
            client/*.apk
            client/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: 📝 Build summary
        if: always()
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Android" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile**: Preview" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Download APK" >> $GITHUB_STEP_SUMMARY
          echo "Check the 'Artifacts' section below to download the built APK." >> $GITHUB_STEP_SUMMARY
