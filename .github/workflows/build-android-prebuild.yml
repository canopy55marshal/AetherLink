name: Build Android with Prebuild

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-android-prebuild:
    name: Build Android (Prebuild + Local)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📚 Install dependencies
        run: |
          cd client
          pnpm install --frozen-lockfile

      - name: 🔨 Run Expo Prebuild
        run: |
          cd client
          echo "🚀 Running Expo prebuild..."
          npx expo prebuild --platform android --clean

      - name: 📱 Build Android APK (Debug)
        run: |
          cd client/android
          echo "🚀 Building Android APK..."
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          # ⚠️ 重要：这里配置的是构建时的后端地址
          # 如果你还没有部署后端服务，先暂时留空或使用测试地址
          EXPO_PUBLIC_BACKEND_BASE_URL: ${{ secrets.BACKEND_URL || 'http://localhost:9091' }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk-debug
          path: client/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📝 Build summary
        if: always()
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Android" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: Debug" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build successful! Download the APK from the artifacts section." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi
